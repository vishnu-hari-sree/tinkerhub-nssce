<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TinkerHub NSSCE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>TinkerHub NSSCE</h2>
</header>

<section class="hero">
  <h1 class="fade-in">Build. Learn. Share. Grow</h1>
  <p class="fade-in delay">Student tech community</p>
</section>

<section id="about" class="fade-in">
  <h2>About</h2>
  <p>Peer learning, open tech culture, and innovation at NSSCE.</p>
</section>

<section id="events">
  <h2>Events</h2>
  <div class="cards">
    <div class="card fade-in">TinkHerHack</div>
    <div class="card fade-in">Workshops</div>
    <div class="card fade-in">CodeSprint</div>
  </div>
</section>

<section id="team">
  <h2>Team</h2>
  <div class="card">Campus Lead NSSCE</div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <input placeholder="Name"><br><br>
  <input placeholder="Email"><br><br>
  <textarea placeholder="Message"></textarea>
</section>

<footer>
  <p>© 2026 TinkerHub NSSCE</p>
</footer>

<script src="script.js"></script>
</body>
</html>
